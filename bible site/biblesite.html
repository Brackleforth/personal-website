<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bible Commands Database</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button id="sidebarToggle">
        ☰ Filters
    </button>

    <div id="sidebar">

        <h2>Filters</h2>

        <label>Book</label>
        <select id="bookFilter">
            <option value="">All</option>
        </select>

        <label>Testament</label>
        <select id="testamentFilter">
            <option value="">All</option>
            <option>Old Testament</option>
            <option>New Testament</option>
        </select>

        <label>Command Giver</label>
        <select id="giverFilter">
            <option value="">All</option>
        </select>

        <label>Command Receiver</label>
        <select id="receiverFilter">
            <option value="">All</option>
        </select>

        <label>Covenant</label>
        <select id="covenantFilter">
            <option value="">All</option>
        </select>

        <label>Applicability</label>
        <select id="applicableFilter">
            <option value="">All</option>
            <option value="true">Applicable Today</option>
            <option value="false">Not Applicable Today</option>
        </select>

        <label>Category</label>
        <select id="categoryFilter">
            <option value="">All</option>
        </select>

        <label>Instruction Type</label>
        <select id="instructionFilter">
            <option value="">All</option>
            <option value="do">Thing To Do</option>
            <option value="dont">Thing Not To Do</option>
        </select>

        <label>Example Type</label>
        <select id="exampleFilter">
            <option value="">All</option>
            <option value="emulate">Person To Emulate</option>
            <option value="avoid">Person Not To Emulate</option>
        </select>

        <label>Command Style</label>
        <select id="commandTypeFilter">
            <option value="">All</option>
            <option value="direct_command">Direct Command</option>
            <option value="implied_command">Implied Command</option>
        </select>

        <label>Results Per Page</label>
        <select id="pageSizeFilter">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="all">All</option>
        </select>

    </div>
    <div id="homeView">
        <h1>Bible Commands Progress</h1>

        <div style="margin:20px 0;">
            <div style="width:100%; background:#ddd; border-radius:8px; overflow:hidden;">
                <div id="progressBar" style="width:0%; height:30px; background:green;"></div>
            </div>

            <p id="progressText" style="font-size:2em;
          font-weight:bold;
          text-align:center;"></p>
            <h2 id="verseCount"></h2>
        </div>

        <button id="enterAppBtn">Enter Bible Commands Database</button>
    </div>
    <div id="appView" style="display:none;">
        <button id="homeBtn">Home</button>
        <div id="mainContent">

            <h1>Bible Commands Database</h1>
            <!-- Display Options -->
            <div id="displayOptions"
                style="margin: 15px 0 20px 0; padding: 12px; background: #f9f9f9; border-radius: 8px;">
                <strong>Show in Results:</strong><br><br>

                <label><input type="checkbox" class="display-toggle" data-field="reference" checked> Reference</label>
                <label><input type="checkbox" class="display-toggle" data-field="verse_text" checked> Verse Text</label>
                <label><input type="checkbox" class="display-toggle" data-field="instruction" checked>
                    Instruction</label>
                <label><input type="checkbox" class="display-toggle" data-field="command_giver" checked> Command
                    Giver</label>
                <label><input type="checkbox" class="display-toggle" data-field="command_receiver" checked> Command
                    Receiver</label>
                <label><input type="checkbox" class="display-toggle" data-field="category" checked> Category</label>
                <label><input type="checkbox" class="display-toggle" data-field="command_type" checked> Command
                    Type</label>
                <label><input type="checkbox" class="display-toggle" data-field="covenant" checked> Covenant</label>
                <label><input type="checkbox" class="display-toggle" data-field="applicable_to" checked> Applicability
                    To</label>
                <label><input type="checkbox" class="display-toggle" data-field="notes"> Notes</label>
            </div>
            <div style="margin-bottom: 15px;">
                <button id="compileBtn">Compile Results</button>
                <button id="sortBtn">Sort Results (by Instruction Frequency)</button>
            </div>

            <div id="summary"></div>

            <!-- Normal Results -->
            <div id="results"></div>

            <!-- New Sorted Table -->
            <div id="sortedTableContainer" style="display: none;">
                <h2>Instructions Sorted by Frequency</h2>
                <table id="frequencyTable" style="width:100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background:#333; color:white;">
                            <th style="padding:10px; text-align:left;">Instruction</th>
                            <th style="padding:10px; text-align:center; width:80px;">Count</th>
                            <th style="padding:10px; text-align:left;">References</th>
                        </tr>
                    </thead>
                    <tbody id="frequencyTableBody"></tbody>
                </table>
            </div>
            <div id="pagination"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
